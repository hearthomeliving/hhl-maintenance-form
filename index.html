<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

  color: #1f2937;
  font-size: 16px;

}
.proto-banner {
  background: #fef3c7;
  color: #78350f;

  text-align: center;
  border-bottom: 1px solid #fde68a;
}
.proto-banner strong { font-weight: 600; }
.shell {

  margin: 16px auto;
  background: #ffffff;
  border-radius: 16px;

}
header.app-header {

  color: #ffffff;
  padding: 14px 20px 12px;

  align-items: center;

}
header.app-header h1 {

  font-size: 16px;
  font-weight: 500;
}
header.app-header .subtitle {
  font-size: 12px;

  font-weight: 400;
}
.progress {
  display: flex;
  gap: 4px;
  padding: 12px 20px 0;
}
.progress span {

}
.progress span.done { background: #469B82; }
.progress span.active { background: #0c4145; }
main.screen {

}
.step-eyebrow {

  color: #6b7280;
  margin: 0 0 4px;

  letter-spacing: 0.04em;
}
.step-title {
  font-size: 20px;
  font-weight: 500;
  margin: 0 0 8px;
  color: #0c4145;
  line-height: 1.3;
}
.step-hint {
  font-size: 14px;
  color: #4b5563;
  margin: 0 0 16px;
}
.field {
  margin-bottom: 14px;
}
.field-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #374151;
  margin-bottom: 6px;
}
.field-label .req {
  color: #dc2626;
  margin-left: 2px;
}
.field-help {
  font-size: 12px;
  color: #6b7280;
  margin-top: 4px;
  line-height: 1.5;
}
input[type=text], input[type=tel], input[type=email], input[type=datetime-local], select, textarea {
  width: 100%;
  padding: 10px 12px;
  font-size: 15px;
  font-family: inherit;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  background: #ffffff;
  color: #1f2937;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #0c4145;
  box-shadow: 0 0 0 3px rgba(12, 65, 69, 0.12);
}
textarea {
  min-height: 100px;
  resize: vertical;
  line-height: 1.5;
}
.check-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.check-item {
  display: flex;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  background: #ffffff;
  cursor: pointer;
  transition: background-color 0.15s, border-color 0.15s;
  align-items: flex-start;
}
.check-item:hover { background: #f9fafb; }
.check-item input { margin-top: 3px; flex-shrink: 0; }
.check-item.checked { background: #ecfdf5; border-color: #6ee7b7; }
.check-item.danger { background: #fef2f2; border-color: #fecaca; }
.check-item.danger.checked { background: #fee2e2; border-color: #fca5a5; }
.check-item label { font-size: 14px; flex: 1; line-height: 1.5; cursor: pointer; }
.skip-reason {
  margin-top: 6px;
  display: none;
}
.check-item.skipped .skip-reason { display: block; }
.skip-reason input {
  font-size: 13px;
  padding: 6px 8px;
}
.skip-link {
  font-size: 12px;
  color: #6b7280;
  text-decoration: underline;
  cursor: pointer;
  margin-left: auto;
  flex-shrink: 0;
  background: none;
  border: none;
  padding: 0;
}
.severity-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.sev-pill {
  flex: 1;
  min-width: 80px;
  padding: 12px 8px;
  text-align: center;
  border: 1px solid #d1d5db;
  border-radius: 10px;
  background: #ffffff;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: #374151;
  transition: all 0.15s;
}
.sev-pill:hover { border-color: #9ca3af; }
.sev-pill.selected { border-color: #0c4145; background: #0c4145; color: #ffffff; }
.sev-pill .sub { display: block; font-size: 11px; font-weight: 400; margin-top: 2px; opacity: 0.85; }
.photo-uploader {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  border: 2px dashed #d1d5db;
  border-radius: 10px;
  padding: 16px;
  text-align: center;
  background: #f9fafb;
  cursor: pointer;
  transition: border-color 0.15s;
  font-size: 14px;
  color: #4b5563;
}
.photo-uploader:hover { border-color: #0c4145; }
.photo-uploader input { display: none; }
.photo-uploader .icon {
  font-size: 24px;
  line-height: 1;
}
.photo-list {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 8px;
}
.photo-tile {
  aspect-ratio: 1;
  background: #e5e7eb;
  border-radius: 6px;
  background-size: cover;
  background-position: center;
  position: relative;
}
.photo-tile .remove {
  position: absolute;
  top: 2px;
  right: 2px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
}
.warn-banner {
  background: #fef3c7;
  border: 1px solid #fde68a;
  color: #78350f;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 12px;
  line-height: 1.5;
}
.danger-banner {
  background: #fee2e2;
  border: 1px solid #fca5a5;
  color: #7f1d1d;
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 12px;
  line-height: 1.5;
}
.info-banner {
  background: #dbeafe;
  border: 1px solid #93c5fd;
  color: #1e3a8a;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 12px;
  line-height: 1.5;
}
.summary-card {
  background: #f9fafb;
  border-radius: 10px;
  padding: 14px;
  font-size: 14px;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  gap: 10px;
}
.summary-row .label { color: #6b7280; flex-shrink: 0; }
.summary-row .value { text-align: right; word-break: break-word; }
.summary-row.block { flex-direction: column; }
.summary-row.block .value { text-align: left; margin-top: 4px; }
.payload-preview {
  background: #1f2937;
  color: #e5e7eb;
  padding: 12px;
  border-radius: 8px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 11px;
  line-height: 1.5;
  overflow-x: auto;
  white-space: pre;
  margin-top: 12px;
}
.nav {
  display: flex;
  gap: 8px;
  margin-top: auto;
  padding-top: 16px;
}
.nav button {
  flex: 1;
  padding: 12px 16px;
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.btn-primary { background: #0c4145; color: #ffffff; }
.btn-primary:hover { background: #073134; }
.btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
.btn-secondary { background: #ffffff; color: #374151; border-color: #d1d5db; }
.btn-secondary:hover { background: #f9fafb; }
.btn-danger { background: #dc2626; color: #ffffff; }
.success-icon {
  width: 56px;
  height: 56px;
  background: #d1fae5;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 8px auto;
  font-size: 28px;
  color: #047857;
}
.ref-num {
  text-align: center;
  font-family: ui-monospace, monospace;
  font-size: 18px;
  font-weight: 500;
  padding: 10px;
  background: #f3f4f6;
  border-radius: 8px;
  letter-spacing: 0.05em;
}
.next-steps { font-size: 13px; line-height: 1.65; color: #4b5563; }
.next-steps strong { color: #1f2937; font-weight: 500; }
.section-ref {
  font-size: 11px;
  color: #9ca3af;
  margin-top: 12px;
  text-align: right;
}
.foot-note {
  font-size: 11px;
  color: #6b7280;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #f3f4f6;
  line-height: 1.5;
}
.settings-footer { text-align: center; margin: 12px auto 24px; font-size: 12px; color: #6b7280; }
.settings-footer button { background: none; border: none; color: #0c4145; text-decoration: underline; cursor: pointer; font-size: 12px; padding: 4px 8px; font-family: inherit; }
.settings-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; }
.settings-modal { background: #ffffff; border-radius: 12px; max-width: 480px; width: 100%; padding: 20px 22px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); max-height: 90vh; overflow-y: auto; }
.settings-modal h2 { margin: 0 0 4px; font-size: 18px; color: #0c4145; font-weight: 500; }
.settings-modal p.lede { margin: 0 0 16px; font-size: 13px; color: #4b5563; line-height: 1.5; }
.settings-modal .actions { display: flex; gap: 8px; margin-top: 16px; }
.settings-modal .actions button { flex: 1; }
@media (max-width: 520px) {
  .shell { margin: 0; border-radius: 0; box-shadow: none; }
  body { background: #ffffff; }
}
</style>
</head>

<div class="settings-footer">

<div id="settings-overlay" class="settings-overlay" style="display: none;"></div>

<script>
const HOMES = ['Aurora', 'Lyra', 'Orion', 'Cygnus', 'Leo', 'Lynx', 'Phoenix House', 'Pegasus House', 'Vela House'];

const EMERGENCY_999 = [
  'Fire or smoke in the building',
  'Smell of gas that will not clear',
  'Structural collapse (ceiling, wall, floor)',
  'Flooding creating serious electrical danger',
  'Someone seriously hurt or trapped'

const ONCALL = [

  } catch (e) {

  }
}

function saveSettings(next) {

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(k => {
      const v = attrs[k];
      if (v == null) return;
      if (k === 'class') e.className = v;
      else if (k === 'html') e.innerHTML = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    });
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null) return;
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
  }
  return e;
}

function renderProgress() {
  const p = document.getElementById('progress');
  p.innerHTML = '';
  for (let i = 0; i < TOTAL_STEPS; i++) {
    const s = document.createElement('span');
    if (i < state.step) s.classList.add('done');
    if (i === state.step) s.classList.add('active');
    p.appendChild(s);
  }
  document.getElementById('step-counter').textContent = (state.step + 1) + ' of ' + TOTAL_STEPS;
}

function setSev(v, auto) {

function selectField(name, value, options, opts) {
  opts = opts || {};
  const sel = el('select', { id: 'f-' + name, onchange: (e) => { state[name] = e.target.value; if (opts.onchange) opts.onchange(e.target.value); } });
  options.forEach(o => {
    const op = document.createElement('option');
    if (typeof o === 'string') { op.value = o; op.textContent = o; }
    else { op.value = o.value; op.textContent = o.label; }
    if ((typeof o === 'string' ? o : o.value) === value) op.selected = true;
    sel.appendChild(op);
  });
  return sel;
}

function textField(name, value, placeholder) {
  return el('input', {
    type: 'text', id: 'f-' + name, value: value || '', placeholder: placeholder || '',
    oninput: (e) => state[name] = e.target.value
  });
}

function field(labelText, inputEl, helpText, required) {
  return el('div', { class: 'field' }, [
    el('label', { class: 'field-label' }, [labelText, required ? el('span', { class: 'req' }, '*') : null]),

    helpText ? el('div', { class: 'field-help' }, helpText) : null

}

function navButtons(opts) {

function compressImage(file, maxEdge, quality) {
  return new Promise(function (resolve, reject) {
    const reader = new FileReader();
    reader.onload = function (ev) {
      const img = new Image();
      img.onload = function () {
        let w = img.naturalWidth;
        let h = img.naturalHeight;
        const scale = Math.min(1, maxEdge / Math.max(w, h));
        w = Math.round(w * scale);
        h = Math.round(h * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        const b64 = (dataUrl.split(',')[1] || '');
        const bytes = Math.floor(b64.length * 3 / 4);
        resolve({ dataUrl: dataUrl, width: w, height: h, bytes: bytes });
      };
      img.onerror = function () { reject(new Error('Could not decode image')); };
      img.src = ev.target.result;
    };
    reader.onerror = function () { reject(new Error('Could not read file')); };
    reader.readAsDataURL(file);
  });
}

function handlePhotos(ev) {
  const files = Array.from(ev.target.files || []);
  const rejected = [];
  const accepted = [];
  files.slice(0, 5 - state.photos.length).forEach(function (f) {
    if (!f.type || f.type.indexOf('image/') !== 0) { rejected.push(f.name + ' (not an image)'); return; }
    if (f.size < MIN_PHOTO_BYTES) { rejected.push(f.name + ' (too small, looks like an icon or thumbnail)'); return; }
    accepted.push(f);
  });
  ev.target.value = '';

  accepted.forEach(function (f) {
    compressImage(f, 1600, 0.85).then(function (out) {
      state.photos.push({
        name: f.name.replace(/\.[^.]+$/, '') + '.jpg',
        original_name: f.name,
        original_bytes: f.size,
        bytes: out.bytes,
        type: 'image/jpeg',
        width: out.width,
        height: out.height,
        dataUrl: out.dataUrl
      });
      refreshPhotoList(document.getElementById('photo-list'));
    }).catch(function (err) {
      alert('Could not process ' + f.name + ': ' + (err && err.message ? err.message : 'unknown error'));
    });
  });

  if (rejected.length) {
    alert('These files were not added:\n\n' + rejected.join('\n') + '\n\nPhotos need to be real images and at least ' + Math.round(MIN_PHOTO_BYTES / 1024) + ' KB.');
  }
}

function refreshPhotoList(container) {
  if (!container) return;
  container.innerHTML = '';
  state.photos.forEach((p, i) => {

    container.appendChild(t);

  sum.appendChild(row('Home', state.home));
  sum.appendChild(row('Submitter', state.name + ' (' + state.role + ')'));
  sum.appendChild(row('Reachable on', state.contactMethod + ' — ' + state.contactValue));
  sum.appendChild(row('Category', state.category));
  sum.appendChild(row('Room', state.room));
  sum.appendChild(row('Severity', state.severity + (state.severityAutoBumped ? ' (auto)' : '')));
  sum.appendChild(row('Children in area', state.childrenInArea));
  sum.appendChild(row('First noticed', state.noticedAt));
  sum.appendChild(row('Photos', String(state.photos.length)));

  const gateDone = Object.keys(state.gateStatus).filter(k => state.gateStatus[k] === 'done').length;
  const gateSkipped = Object.keys(state.gateSkipReasons).length;
  sum.appendChild(row('SOP checks', gateDone + ' done, ' + gateSkipped + ' skipped'));

  const descRow = el('div', { class: 'summary-row block' }, [
    el('span', { class: 'label' }, 'Description'),
    el('span', { class: 'value' }, state.description)
  ]);
  sum.appendChild(descRow);

  screen.appendChild(sum);

  screen.appendChild(navButtons({ onNext: submit, nextLabel: 'Submit request' }));
}

function buildPayload() {
  return {
    reference: state.refNumber,
    submitted_at: new Date().toISOString(),
    notify_mark_to: settings.notify_mark_to || DEFAULT_SETTINGS.notify_mark_to,
    notify_submitter_to: settings.notify_submitter_to_override || state.contactValue || DEFAULT_SETTINGS.notify_mark_to,
    submitter: {
      name: state.name,
      role: state.role,
      contact_method: state.contactMethod,
      contact_value: state.contactValue
    },
    home: state.home,
    room: state.room,
    category: state.category,
    severity: state.severity,
    severity_auto_bumped: state.severityAutoBumped,
    children_in_area: state.childrenInArea,
    noticed_at: state.noticedAt,
    description: state.description,
    pre_checks_completed: Object.keys(state.preChecks).filter(k => state.preChecks[k]),
    sop_gates_done: Object.keys(state.gateStatus).filter(k => state.gateStatus[k] === 'done'),
    sop_gates_skipped: Object.keys(state.gateSkipReasons).map(k => ({ check: k, reason: state.gateSkipReasons[k] })),
    urgent_flags_ticked: state.urgentTicked,
    photos_count: state.photos.length,
    photos: state.photos.map(function (p) {
      return {
        name: p.name,
        type: p.type,
        bytes: p.bytes,
        width: p.width,
        height: p.height,
        data_url: p.dataUrl
      };
    }),
    routing_intent: routingHint()
  };
}

function routingHint() {
  if (state.severity === 'Urgent') return 'WhatsApp Mark immediately + auto-email contractor based on category';
  if (state.severity === 'Priority') return 'Email Mark + email preferred contractor';
  return 'Daily digest to Mark, contractor email when triaged';
}

let lastSubmitStatus = null;

function submit() {
  state.refNumber = 'MAINT-2026-' + String(Math.floor(Math.random() * 9000) + 1000);
  const webhook = settings.webhook_url || DEFAULT_SETTINGS.webhook_url;
  lastSubmitStatus = webhook ? 'sending' : 'no-webhook';
  state.step = 9;
  render();
  if (!webhook) return;
  const payload = buildPayload();
  fetch(webhook, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function (res) {
    lastSubmitStatus = res.ok ? 'success' : ('http-' + res.status);
    if (state.step === 9) render();
  }).catch(function (err) {
    lastSubmitStatus = 'error: ' + ((err && err.message) || 'fetch failed');
    if (state.step === 9) render();
  });
}

function renderSettings() {
  const overlay = document.getElementById('settings-overlay');
  overlay.style.display = 'flex';
  overlay.innerHTML = '';
  const modal = el('div', { class: 'settings-modal' });
  modal.appendChild(el('h2', null, 'Settings'));
  modal.appendChild(el('p', { class: 'lede' }, 'Settings saved to this device only. To change globally for everyone, an admin would update the n8n config.'));

  modal.appendChild(field('Send "Mark" notification email to', el('input', {
    type: 'email',
    id: 's-notify-mark',
    value: settings.notify_mark_to || '',
    placeholder: 'adrian@hearthomeliving.co.uk'
  }), 'Where the Mark-side notification email lands. In production this is Mark\'s real address; in sandbox, your address.', false));

  modal.appendChild(field('Override submitter confirmation to', el('input', {
    type: 'email',
    id: 's-notify-submitter',
    value: settings.notify_submitter_to_override || '',
    placeholder: '(leave blank to use the submitter\'s own contact)'
  }), 'Optional. If blank, the submitter\'s own contact value from the form is used.', false));

  modal.appendChild(field('Webhook URL', el('input', {
    type: 'text',
    id: 's-webhook',
    value: settings.webhook_url || '',
    placeholder: DEFAULT_SETTINGS.webhook_url
  }), 'Where the form POSTs on submit. Leave as default unless you have a different test or production endpoint.', false));

  const debugWrap = el('div', { class: 'field' }, [
    el('label', { class: 'field-label' }, 'Debug mode'),
    el('div', { class: 'check-item' + (settings.debug_mode ? ' checked' : '') }, [
      el('input', { type: 'checkbox', id: 's-debug', checked: settings.debug_mode ? 'checked' : null, onchange: (e) => {
        e.target.parentElement.classList.toggle('checked', e.target.checked);
      }}),
      el('label', { for: 's-debug' }, 'Show raw JSON payload on the Sent screen')
    ]),
    el('div', { class: 'field-help' }, 'For sandbox testing only. Leave off for real users.')
  ]);
  modal.appendChild(debugWrap);

  const actions = el('div', { class: 'actions' });
  actions.appendChild(el('button', { class: 'btn-secondary', onclick: closeSettings }, 'Cancel'));
  actions.appendChild(el('button', {
    class: 'btn-primary',
    onclick: function () {
      const newSettings = {
        notify_mark_to: document.getElementById('s-notify-mark').value.trim(),
        notify_submitter_to_override: document.getElementById('s-notify-submitter').value.trim(),
        webhook_url: document.getElementById('s-webhook').value.trim() || DEFAULT_SETTINGS.webhook_url,
        debug_mode: document.getElementById('s-debug').checked
      };
      saveSettings(newSettings);
      closeSettings();
    }
  }, 'Save'));
  modal.appendChild(actions);

  overlay.appendChild(modal);
  overlay.onclick = function (e) { if (e.target === overlay) closeSettings(); };
}

function closeSettings() {
  const overlay = document.getElementById('settings-overlay');
  overlay.style.display = 'none';
  overlay.innerHTML = '';
}

function renderStep9() {
  const screen = document.getElementById('screen');
  screen.innerHTML = '';
  screen.appendChild(el('div', { class: 'success-icon' }, '✓'));
  screen.appendChild(el('h2', { class: 'step-title', style: 'text-align: center;' }, 'Submitted'));
  screen.appendChild(el('div', { class: 'ref-num' }, state.refNumber));

  if (lastSubmitStatus === 'sending') {
    screen.appendChild(el('div', { class: 'info-banner', style: 'margin-top: 12px;' }, 'Posting to test pipeline...'));
  } else if (lastSubmitStatus === 'success') {
    screen.appendChild(el('div', { class: 'info-banner', style: 'margin-top: 12px;' }, 'Posted to test pipeline. Check your inbox plus the test list in ClickUp.'));
  } else if (lastSubmitStatus === 'no-webhook') {
    screen.appendChild(el('div', { class: 'warn-banner', style: 'margin-top: 12px;' }, 'No webhook configured. Payload below for manual POST.'));
  } else if (lastSubmitStatus) {
    screen.appendChild(el('div', { class: 'warn-banner', style: 'margin-top: 12px;' }, 'Post failed: ' + lastSubmitStatus + '. Workflow may be inactive, or browser blocked CORS / file:// fetch. Payload below for manual POST.'));
  }

  const next = el('div', { class: 'next-steps', style: 'margin-top: 12px;' });
  next.innerHTML = '<strong>What happens next (in production):</strong><br>' +
    '. You get a WhatsApp confirmation within a minute.<br>' +
    '. Mark gets notified at his preferred channel based on severity.<br>' +
    '. A contractor matching the category gets emailed within the hour with your photos and SOP results.<br>' +
    '. If Severity is Urgent and Mark does not acknowledge in 5 minutes, Ruth is alerted.<br>' +
    '. Reply to your WhatsApp with the reference number anytime to check status.';
  screen.appendChild(next);

  if (settings.debug_mode) {
    screen.appendChild(el('p', { class: 'step-eyebrow', style: 'margin-top: 16px;' }, 'Payload sent (debug mode)'));
    const payload = JSON.stringify(buildPayload(), null, 2);
    screen.appendChild(el('div', { class: 'payload-preview' }, payload));
  }

  screen.appendChild(navButtons({ back: false, onNext: function () { resetState(); state.step = 0; render(); }, nextLabel: 'Log another issue', primaryClass: 'btn-secondary' }));
}

function resetState() {
  lastSubmitStatus = null;
  state.emergencyTicked = [];
  state.preChecks = {};
  state.category = '';
  state.gateStatus = {};
  state.gateSkipReasons = {};
  state.urgentTicked = [];
  state.description = '';
  state.room = '';
  state.noticedAt = '';
  state.photos = [];
  state.childrenInArea = 'No';
  state.severity = 'Routine';
  state.severityAutoBumped = false;
  state.refNumber = '';
}

function back() {
  state.step = Math.max(state.step - 1, 0);
  render();
}

function render() {
  renderProgress();
  switch (state.step) {
    case 0: renderStep0(); break;
    case 1: renderStep1(); break;
    case 2: renderStep2(); break;
    case 3: renderStep3(); break;
    case 4: renderStep4(); break;
    case 5: renderStep5(); break;
    case 6: renderStep6(); break;
    case 7: renderStep7(); break;
    case 8: renderStep8(); break;
    case 9: renderStep9(); break;
    default: renderStep0();
  }
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('service-worker.js').catch(function () {
      // Service worker registration failures are non-fatal. Form still works without offline support.
    });
  });
}
</script>

</body>
</html>
