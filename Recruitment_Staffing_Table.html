<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home Staffing Register</title>
<style>
  :root{--bg:#0e1726;--panel:#15233c;--ink:#eaf0fb;--muted:#9fb1d0;--line:rgba(255,255,255,.10);--accent:#4f8cff;--good:#34d399;--warn:#fbbf24;--bad:#f87171}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 600px at 20% -10%,#1b2c49 0%,#0e1726 55%);color:var(--ink);min-height:100vh}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 48px}
  .top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:16px}
  h1{font-size:22px;margin:0 0 3px}
  .sub{color:var(--muted);font-size:13px;margin:0}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .stamp{color:var(--muted);font-size:11px;margin-top:5px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:680px}
  th,td{padding:11px 10px;border-bottom:1px solid var(--line);text-align:center}
  th:first-child,td:first-child{text-align:left;font-weight:700;position:sticky;left:0;background:var(--panel)}
  thead th{color:var(--muted);font-size:12px;font-weight:600;border-bottom:2px solid var(--line)}
  td.n{font-variant-numeric:tabular-nums;font-weight:700}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:800}
  .pill.zero{background:rgba(52,211,153,.15);color:var(--good)}
  .pill.some{background:rgba(251,191,36,.15);color:var(--warn)}
  tr.total td{border-top:2px solid var(--line);font-weight:800;background:rgba(79,140,255,.10)}
  .loading{padding:36px;text-align:center;color:var(--muted)}
  .err{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Home Staffing Register</h1>
      <p class="sub">Heart &amp; Home Living · staffing by home · live</p>
      <div class="stamp" id="stamp"></div>
    </div>
    <button class="btn" id="refresh">↻ Refresh</button>
  </div>
  <div class="card"><div id="box"><div class="loading">Loading live data…</div></div></div>
</div>

<script>
  const STAFFING_URL = "https://ruthbloch.app.n8n.cloud/webhook/recruitment-staffing";

  function render(data){
    var homes = data.homes || [];
    var head = '<tr><th>Home</th><th>Max placements</th><th>Currently placed</th><th>Staff in post</th><th>Budgeted posts</th><th>Required (calc)</th><th>Open vacancies</th></tr>';
    var t = { max:0, placed:0, filled:0, budgeted:0, required:0, vac:0 };
    var body = homes.map(function(h){
      var max = h.max_placements||0, placed = h.current_placements||0, filled = h.filled||0, budgeted = h.budgeted||0, required = h.required_staff||0, vac = h.vacancies||0;
      t.max+=max; t.placed+=placed; t.filled+=filled; t.budgeted+=budgeted; t.required+=required; t.vac+=vac;
      var vacCls = vac===0 ? 'zero' : 'some';
      return '<tr><td>'+h.home+'</td>'+
        '<td class="n">'+max+'</td>'+
        '<td class="n">'+placed+'</td>'+
        '<td class="n">'+filled+'</td>'+
        '<td class="n">'+budgeted+'</td>'+
        '<td class="n">'+required+'</td>'+
        '<td class="n"><span class="pill '+vacCls+'">'+vac+'</span></td></tr>';
    }).join('');
    var totRow = '<tr class="total"><td>Total</td><td class="n">'+t.max+'</td><td class="n">'+t.placed+'</td><td class="n">'+t.filled+'</td><td class="n">'+t.budgeted+'</td><td class="n">'+t.required+'</td><td class="n">'+t.vac+'</td></tr>';
    document.getElementById('box').innerHTML = '<table><thead>'+head+'</thead><tbody>'+body+totRow+'</tbody></table>';
    document.getElementById('stamp').textContent = 'Live · updated ' + (data.updated ? new Date(data.updated).toLocaleString() : new Date().toLocaleString());
  }

  function load(){
    fetch(STAFFING_URL + '?t=' + Date.now())
      .then(function(r){ return r.json(); })
      .then(render)
      .catch(function(){ document.getElementById('box').innerHTML = '<div class="loading err">Could not load live data. Try Refresh.</div>'; });
  }
  document.getElementById('refresh').addEventListener('click', load);
  load();
  setInterval(load, 60000);
</script>
</body>
</html>
